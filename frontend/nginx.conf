server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — smaller files = faster load on mobile
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # React Router — serve index.html for all routes so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    # Frontend calls /api/... → backend:4000/api/...
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets aggressively — hashed filenames mean safe long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # PWA — don't cache the service worker or manifest
    location ~* (service-worker\.js|manifest\.json)$ {
        expires 0;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
